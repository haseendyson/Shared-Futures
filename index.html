<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Our Future — Healthcare Futures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F3EA; --card: #FFFFFF; --ink: #26302B; --ink-soft: #5B6B62;
    --teal: #1E5B55; --teal-deep: #123F3B; --teal-pale: #EAF3F1;
    --gold: #C68A3B; --gold-light: #F3E3C3; --flame: #E7A23B;
    --line: #E4DFD3; --radius: 16px; --rose:#B0503F;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center; padding:28px 14px 90px; }
  .wrap { width:100%; max-width:680px; }
  .eyebrow { font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal); font-weight:700; margin-bottom:8px; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:26px; line-height:1.28; margin:0 0 12px; color:var(--teal-deep); }
  h2 { font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin:0 0 10px; color:var(--teal-deep); }
  p { line-height:1.6; }
  .muted { color:var(--ink-soft); font-size:13.5px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:26px 24px; margin-bottom:18px; box-shadow:0 1px 2px rgba(18,63,59,.03); }
  .vignette { background:#F2EFE4; border-left:3px solid var(--gold); padding:16px 18px; border-radius:4px; font-style:italic; line-height:1.65; font-size:15px; }
  .vignette-tag { font-style:normal; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:8px; display:block; }
  .horizon-tag { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; color:#fff; background:var(--teal); padding:4px 11px 4px 8px; border-radius:20px; margin-bottom:12px; }
  label.q { display:block; font-weight:700; font-size:15px; margin:4px 0 4px; color:var(--teal-deep); font-family:'Fraunces',serif; }
  .q-hint { display:block; font-weight:400; font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; }
  .btn-row { display:flex; justify-content:space-between; align-items:center; margin-top:22px; gap:10px; }
  button { font-family:'Inter',sans-serif; font-weight:700; font-size:14px; padding:11px 20px; border-radius:10px; border:none; cursor:pointer; transition:transform .12s ease, opacity .15s ease, box-shadow .15s ease; }
  button:hover { opacity:.9; } button:active { transform:scale(.97); } button:focus-visible { outline:2px solid var(--teal-deep); outline-offset:2px; }
  .primary { background:var(--teal); color:#fff; box-shadow:0 2px 0 var(--teal-deep); }
  .primary:disabled { background:#CBD3CE; color:#828E88; cursor:not-allowed; box-shadow:none; }
  .ghost { background:transparent; color:var(--ink-soft); }
  .skiptext { background:none; border:none; color:var(--ink-soft); text-decoration:underline; font-weight:600; font-size:13px; padding:6px; cursor:pointer; }

  /* ---------- Lantern progress path ---------- */
  .lanternpath { display:flex; align-items:center; margin-bottom:24px; padding:0 2px; }
  .lantern-node { position:relative; display:flex; flex-direction:column; align-items:center; flex:0 0 auto; }
  .lantern-node svg { width:20px; height:24px; display:block; }
  .lantern-flame { fill:#D9D2C2; transition:fill .4s ease; }
  .lantern-node.lit .lantern-flame { fill:var(--flame); }
  .lantern-node.lit svg { filter:drop-shadow(0 0 5px rgba(231,162,59,.85)); animation:flicker 2.6s ease-in-out infinite; }
  .lantern-node.current svg { filter:drop-shadow(0 0 7px rgba(231,162,59,1)); animation:flicker 1.4s ease-in-out infinite; }
  @keyframes flicker { 0%,100%{ opacity:1; } 45%{ opacity:.82; } 60%{ opacity:1; } }
  .lantern-link { flex:1 1 auto; height:2px; background:var(--line); margin:0 3px; position:relative; top:-8px; border-radius:1px; }
  .lantern-link.done { background:linear-gradient(90deg, var(--flame), var(--gold)); }
  .lantern-label { font-size:9px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-top:3px; white-space:nowrap; }

  /* ---------- Chip picker ---------- */
  .chip-options { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .chip { border:1.5px solid var(--line); background:#FCFBF8; color:var(--ink); font-size:13.5px; font-weight:600; padding:8px 14px; border-radius:20px; cursor:pointer; transition:all .15s ease; user-select:none; }
  .chip:hover { border-color:var(--teal); }
  .chip.selected { background:var(--teal); border-color:var(--teal); color:#fff; transform:translateY(-1px); }
  .bundle-tray { min-height:44px; background:var(--teal-pale); border:1.5px dashed #BFD6D0; border-radius:12px; padding:10px 12px; display:flex; flex-wrap:wrap; gap:7px; align-items:flex-start; margin-bottom:10px; transition:border-color .15s ease; }
  .bundle-tray.empty::before { content:"Tap the pieces above — they'll land here"; color:var(--ink-soft); font-size:13px; font-style:italic; padding:6px 2px; }
  .pill { display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--teal); color:var(--teal-deep); font-size:13px; font-weight:600; padding:6px 10px 6px 12px; border-radius:16px; animation:pop .18s ease; }
  .pill.custom { border-style:dashed; border-color:var(--gold); background:var(--gold-light); }
  .pill button.rm { background:none; border:none; color:inherit; opacity:.55; cursor:pointer; font-size:13px; padding:0 2px; line-height:1; }
  .pill button.rm:hover { opacity:1; }
  @keyframes pop { from{ transform:scale(.7); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .custom-add { display:flex; gap:8px; margin-bottom:4px; }
  .custom-add input { flex:1; font-family:'Inter',sans-serif; font-size:13.5px; padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:#FCFBF8; }
  .custom-add input:focus { outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal); }
  .custom-add button { background:var(--gold); color:#fff; padding:8px 14px; font-size:13px; white-space:nowrap; }

  /* icon-choice tiles */
  .icon-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:14px; }
  .icon-tile { border:1.5px solid var(--line); background:#FCFBF8; border-radius:12px; padding:14px 8px; text-align:center; cursor:pointer; transition:all .15s ease; font-size:13px; font-weight:600; }
  .icon-tile .em { font-size:22px; display:block; margin-bottom:4px; }
  .icon-tile:hover { border-color:var(--teal); }
  .icon-tile.selected { background:var(--teal); border-color:var(--teal); color:#fff; }

  .flag-banner { background:#FBEFEA; border:1px solid #E8C9BA; color:#7A4A34; font-size:13px; padding:11px 13px; border-radius:8px; margin:6px 0 14px; line-height:1.5; display:none; }

  .footer-note { font-size:12px; color:var(--ink-soft); text-align:center; margin-top:26px; line-height:1.6; }
  .thanks-icon { font-size:32px; margin-bottom:6px; }
  .reflection-box { background:#F2EFE4; border-radius:10px; padding:18px 20px; font-size:14.5px; line-height:1.7; margin-top:6px; }
  .loading { font-size:13.5px; color:var(--ink-soft); font-style:italic; display:flex; align-items:center; gap:8px; }
  .loading .dotpulse { display:inline-flex; gap:3px; }
  .loading .dotpulse span { width:5px; height:5px; border-radius:50%; background:var(--gold); animation:dotp 1.1s infinite; }
  .loading .dotpulse span:nth-child(2){ animation-delay:.15s; } .loading .dotpulse span:nth-child(3){ animation-delay:.3s; }
  @keyframes dotp { 0%,80%,100%{ opacity:.25; transform:scale(.8);} 40%{ opacity:1; transform:scale(1);} }
  .anon-id { font-family:monospace; font-size:12px; color:var(--ink-soft); background:#F2EFE4; padding:3px 8px; border-radius:5px; }

  .scenario-grid { display:grid; gap:12px; }
  .scenario-pick { border:1px solid var(--line); border-radius:12px; padding:16px; cursor:pointer; transition:all .15s ease; position:relative; }
  .scenario-pick:hover { border-color:var(--teal); background:#F5F8F6; transform:translateY(-1px); }
  .scenario-pick.selected { border-color:var(--teal); background:var(--teal-pale); }
  .scenario-pick .tap-hint { position:absolute; top:14px; right:16px; font-size:11px; color:var(--ink-soft); font-weight:600; }

  .postcard { background:linear-gradient(155deg,#fff,#F8F4EA); border:1px solid var(--line); border-radius:14px; padding:20px; margin-top:14px; }
  .postcard-title { font-family:'Fraunces',serif; font-weight:600; color:var(--teal-deep); font-size:15px; margin-bottom:10px; }
  .postcard-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .postcard-row .tag { background:var(--gold-light); color:var(--teal-deep); font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:12px; }
  .postcard-label { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700; margin:10px 0 4px; }

  .encourage { font-size:12.5px; color:var(--gold); font-weight:700; margin-top:2px; min-height:16px; }

  /* API Key setup screen */
  .api-setup { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:28px 24px; margin-bottom:18px; }
  .api-setup input[type="password"] { width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:11px 13px; border-radius:8px; border:1px solid var(--line); background:#FCFBF8; margin:10px 0 6px; }
  .api-setup input[type="password"]:focus { outline:2px solid var(--teal); border-color:var(--teal); }
  .api-note { font-size:12px; color:var(--ink-soft); margin-bottom:14px; line-height:1.5; }
  .error-msg { color:var(--rose); font-size:13px; margin-top:6px; min-height:18px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =========================================================================
   BUILD OUR FUTURE — Healthcare Futures Instrument
   Complete, self-contained single-file version.
   Uses Anthropic API (claude-sonnet-5) for AI reflection paraphrase.
   Falls back to localStorage for data persistence.
   ========================================================================= */

/* ---------- Data: scenarios ---------- */
const SCENARIOS = [
  { id:'s1', tag:'Medicine access & mental health',
    text:"After a GP visit, a prescription turns out to be unavailable at the local pharmacy, and the cost of an alternative is a shock. Around the same time, a family member has been quietly struggling — possibly postnatal depression, possibly general stress — but no one names it directly, and asking for mental health support doesn't feel like something the family knows how to do." },
  { id:'s2', tag:'Chronic conditions & elder care',
    text:"Someone managing diabetes and high cholesterol is given dietary advice that doesn't really account for the food their household actually eats. Meanwhile, an elderly parent's memory has been slipping — confusion that might be early dementia — and arthritis makes moving around harder. Coordinating appointments, translating advice, and deciding who takes time off work becomes its own project." },
  { id:'s3', tag:'Trust, access & information',
    text:"An interpreter doesn't show up for a booked appointment, so the visit goes ahead without one. There's a long wait for a dental or ENT referral. A past misdiagnosis, or a moment of feeling dismissed, has made the whole family more hesitant to engage with the system — including around vaccines, where messages from back home don't match what's said here. Registering as a new arrival with a GP adds another layer of confusion." }
];

/* ---------- Data: reaction chip questions ---------- */
const VREACT_QUESTIONS = [
  { key:'missing', label:"What feels missing or going wrong here?", hint:"Tap what fits — stack as many as you like.",
    chips:["No interpreter offered","Rushed appointment","Family translating sensitive details","Nobody asked how they felt","Long wait to be seen","Cost wasn't explained","Advice didn't fit their life","Confusion about the next step"] },
  { key:'helpful', label:"What would have helped, that wasn't there?", hint:"Build the fix, piece by piece.",
    chips:["A trained interpreter every time","More time per appointment","Written notes in their language","A named contact to follow up","A community health worker link","Clearer cost information upfront","Flexible appointment times","Someone checking in afterwards"] },
  { key:'responsible', label:"Who should be responsible for making that happen?", hint:"Pick everyone who shares the load.",
    chips:["🏥 The clinic / GP","🩺 The wider NHS system","🏛️ Government policy","🤝 Community groups","👪 The family","🙋 The person themselves"] }
];

/* ---------- Data: broader reflection chip questions ---------- */
const REFLECT_QUESTIONS = [
  { key:'feelings', label:"How do situations like this tend to make people feel?", hint:"Choose the feelings that ring true.",
    chips:["Dismissed","Exhausted","Anxious","Unheard","Grateful when it goes well","Caught in the middle","Embarrassed to ask","Resigned to it"] },
  { key:'goodHealthcare', label:"What does good healthcare look like to you?", hint:"Assemble your picture of it.",
    chips:["Someone who listens fully","Explained in plain language","No long waits","Care that fits our culture","Same person, seen over time","Family included, not sidelined","Affordable without shocks","Respect, every visit"] },
  { key:'communityChallenges', label:"What are the biggest healthcare challenges your community faces?", hint:"Stack the ones that hit hardest.",
    chips:["Language barriers","Distrust from past experience","Not knowing how the system works","Stigma around mental health","Juggling work and appointments","Advice that ignores our food/culture","Elder care falling on one person","Fear of being judged"] },
  { key:'barriers', label:"What gets in the way of accessing good care?", hint:"What blocks the door?",
    chips:["No interpreter available","Appointments too short","Unfamiliar registration process","Cost of prescriptions","Taking time off work","Not knowing who to ask","Past bad experience","Feeling like a burden"] },
  { key:'familySupport', label:"What role does family play in healthcare decisions?", hint:"How does it usually work?",
    chips:["Translating in the room","Making the decision together","One person carries it all","Elders' advice comes first","Younger generation navigates the system","Keeping things private within the family","Disagreeing on what to do","Showing up for appointments together"] },
  { key:'oneChange', label:"If you could change one thing right now, what would it be?", hint:"Pick your single biggest lever.",
    chips:["Guaranteed interpreters","Longer appointments","A trusted go-between role","Clearer costs","Mental health talked about openly","Culturally-aware dietary advice","Simpler registration","Continuity of care"] }
];

/* ---------- Data: backcasting horizons ---------- */
const HORIZONS = [
  { years:3, prompt:"In 3 years — realistic, near-term. What's noticeably better?",
    visionChips:["Interpreters booked automatically","Shorter waits for referrals","Clear multilingual cost info","A known contact per family","Same-day translation support","Simpler NHS registration"],
    stepPrompt:"What needs to happen soon to get there?",
    stepChips:["Fund interpreter services properly","Track wait times publicly","Train reception staff","Pilot a navigator role","Translate key documents","Simplify registration forms"] },
  { years:5, prompt:"In 5 years — what does good look like for your community?",
    visionChips:["Cultural liaison staff at every clinic","Mental health talked about openly","Community health workers in every area","Trust rebuilt after past harm","Dietary advice reflects real meals","Elder care coordinated, not scattered"],
    stepPrompt:"What needs to shift — services, trust, awareness?",
    stepChips:["Train more bilingual clinicians","Normalise mental health conversations","Fund community health worker programmes","Co-design dietary guidance with communities","Build shared elder-care case files","Expand outreach into trusted spaces"] },
  { years:10, prompt:"In 10 years — imagine it's genuinely solved. What's true?",
    visionChips:["Feels like it was built for us","Trust spans generations","No one translates their own diagnosis","Prevention starts before crisis","Community wisdom and medicine work together","Every family feels informed and heard"],
    stepPrompt:"What has to shift at a bigger level?",
    stepChips:["Change how clinicians are trained","Rebuild trust across generations","Fund community-led health infrastructure","Change how success is measured","Make cultural competence the norm","Let communities co-own the system"] }
];

/* ---------- Data: build-your-own-fix ---------- */
const FIX_FORM_OPTIONS = ["📱 An app","🧑‍⚕️ A role / navigator","📋 A programme","🏛️ A place","🕯️ A ritual","📜 A policy"];
const FIX_LIVES_OPTIONS = ["🏥 A clinic","👪 Family","🏘️ Community centre","📱 A phone","🏛️ Government","☎️ A helpline"];
const FIX_FUNCTION_CHIPS = ["Explains things in plain language","Follows up after appointments","Connects families to interpreters","Coordinates care across generations","Builds trust before crisis hits","Makes costs clear upfront","Bridges home-country and UK advice","Gives someone one point of contact"];
const FIX_RESPONSIBLE_CHIPS = ["🏥 The clinic / GP","🩺 The wider NHS system","🏛️ Government policy","🤝 Community groups","👪 The family","🙋 The person themselves"];
const FIX_EMOTION_CHIPS = ["Respected","Unhurried","Understood","Safe to ask questions","Less alone","In control","Hopeful","Cared for"];
const FIX_CONSTRAINT_CHIPS = ["Never assume everyone speaks English","Never skip explaining costs","Never rush elderly patients","Never share details without consent","Never replace family involvement","Never feel like a form to fill out"];

/* ---------- Privacy guard ---------- */
function flagPersonalDisclosure(text) {
  return /\bmy (mother|father|sister|brother|status|visa|immigration|self)\b|\bi am undocumented\b|\bmy own\b/i.test(text || '');
}

/* ---------- Storage (localStorage fallback) ---------- */
async function saveRecord(record) {
  try {
    const key = 'bof_response_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    localStorage.setItem(key, JSON.stringify(record));
    console.log('Record saved to localStorage with key:', key);
  } catch (e) {
    console.error('Storage error', e);
  }
}

/* ---------- API Key management ---------- */
function getApiKey() {
  return sessionStorage.getItem('bof_api_key') || '';
}
function setApiKey(key) {
  sessionStorage.setItem('bof_api_key', key);
}

/* ---------- AI reflection paraphrase ---------- */
class ReflectionService {
  static async paraphrase(builder) {
    const b = builder.record;
    const scen = SCENARIOS.find(s => s.id === b.scenarioId);
    const bundleText = (label, val) => {
      const parts = [...(val.selected||[]), ...(val.custom||[]).filter(t => !flagPersonalDisclosure(t))];
      return parts.length ? `${label}: ${parts.join('; ')}` : '';
    };
    const lines = [];
    lines.push(`Scenario theme: ${scen ? scen.tag : ''}`);
    VREACT_QUESTIONS.forEach(q => lines.push(bundleText(q.label, b.vreact[q.key] || {})));
    REFLECT_QUESTIONS.forEach(q => lines.push(bundleText(q.label, b.reflect[q.key] || {})));
    HORIZONS.forEach(h => {
      const hb = b.backcast[h.years] || {};
      lines.push(bundleText(`${h.years}-year vision`, hb.vision || {}));
      lines.push(bundleText(`${h.years}-year steps needed`, hb.steps || {}));
    });
    if (b.fix && b.fix.name) {
      lines.push(`Their own idea, "${b.fix.name}": a ${b.fix.form || ''} living with ${b.fix.livesWith || ''}.`);
      lines.push(bundleText('What it does', b.fix.functionChips || {}));
      lines.push(bundleText('Responsible', b.fix.responsible || {}));
      lines.push(bundleText('Should feel', b.fix.emotion || {}));
      lines.push(bundleText('Should never', b.fix.constraints || {}));
    }
    const fullText = lines.filter(Boolean).join('\n');

    const systemPrompt = `You paraphrase a community member's reflections on healthcare access into a short, coherent third-person summary. Use ONLY what is provided — do not add facts, numbers, names, locations, or details not stated. Do not mention immigration status even if implied. Keep it to 4-6 sentences, warm and accurate, no exaggeration.`;

    const apiKey = getApiKey();
    if (!apiKey) {
      return "(No API key provided — your original answers are still saved. You can add a key on the next run to enable AI summaries.)";
    }

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-5",
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: "user", content: fullText }]
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        const msg = errData.error?.message || `HTTP ${response.status}`;
        console.error('API error:', msg);
        return `(AI reflection unavailable: ${msg}. Your answers are still saved.)`;
      }

      const data = await response.json();
      const text = (data.content || []).filter(x => x.type === 'text').map(x => x.text).join('\n');
      return text || "(Reflection unavailable — your original answers are still saved.)";
    } catch (e) {
      console.error('Reflection error', e);
      return "(Reflection unavailable due to a network error — your original answers are still saved.)";
    }
  }
}

/* ---------- Record builder ---------- */
class Builder {
  constructor() {
    this.record = {
      anonId: 'anon-' + Math.random().toString(36).slice(2,8),
      scenarioId: null,
      vreact: {}, reflect: {}, backcast: {}, fix: null,
      aiReflection: null, timestamp: null, flaggedAny: false
    };
  }
  build() { this.record.timestamp = new Date().toISOString(); return this.record; }
}

/* ---------- Controller ---------- */
const ctl = {
  builder: new Builder(),
  phase: 'apisetup',  // start with API key setup
  vIdx: 0, rIdx: 0, hIdx: 0,
  wantsFix: null,
};

/* lantern path config */
const LANTERN_STAGES = ['Scenario','React','Reflect','3yr','5yr','10yr','Build'];
function currentLanternIndex() {
  switch (ctl.phase) {
    case 'scenario': return 0;
    case 'vreact': return 1;
    case 'reflect': return 2;
    case 'backcast': return 3 + ctl.hIdx;
    case 'fixchoice': case 'fix': return 6;
    case 'aireflect': case 'thanks': return 7;
    default: return -1;
  }
}

function renderLanternPath() {
  const active = currentLanternIndex();
  const wrap = document.createElement('div');
  wrap.className = 'lanternpath';
  LANTERN_STAGES.forEach((label, i) => {
    if (i > 0) {
      const link = document.createElement('div');
      link.className = 'lantern-link' + (i <= active ? ' done' : '');
      wrap.appendChild(link);
    }
    const node = document.createElement('div');
    node.className = 'lantern-node' + (i < active ? ' lit' : '') + (i === active ? ' current lit' : '');
    node.innerHTML = `<svg viewBox="0 0 20 24"><path class="lantern-flame" d="M10 1c3 4 5.5 7.4 5.5 11a5.5 5.5 0 1 1-11 0C4.5 8.4 7 5 10 1z"/><rect x="8.5" y="19" width="3" height="4" rx="1" fill="#8a6b3f" opacity="0.5"/></svg><span class="lantern-label">${label}</span>`;
    wrap.appendChild(node);
  });
  return wrap;
}

/* ---------- Chip field component ---------- */
function mountChipField(container, opts) {
  const { chips, value, single = false, placeholder = "Add your own…", onChange = () => {}, flagCheck = false } = opts;
  const box = document.createElement('div');

  const optWrap = document.createElement('div'); optWrap.className = 'chip-options';
  const tray = document.createElement('div'); tray.className = 'bundle-tray';
  const addRow = document.createElement('div'); addRow.className = 'custom-add';
  const input = document.createElement('input'); input.placeholder = placeholder; input.type = 'text';
  const addBtn = document.createElement('button'); addBtn.type = 'button'; addBtn.textContent = 'Add';
  addRow.appendChild(input); addRow.appendChild(addBtn);
  const flagBanner = document.createElement('div'); flagBanner.className = 'flag-banner';
  flagBanner.textContent = "This study collects general reflections, not personal stories. If you'd like to talk to someone about a personal experience, please reach out to your GP or a local community health service. This particular note won't be included in the study data.";

  function renderChips() {
    optWrap.innerHTML = '';
    chips.forEach(c => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'chip' + (value.selected.includes(c) ? ' selected' : '');
      b.textContent = c;
      b.onclick = () => {
        if (single) { value.selected = value.selected.includes(c) ? [] : [c]; }
        else {
          const i = value.selected.indexOf(c);
          if (i === -1) value.selected.push(c); else value.selected.splice(i, 1);
        }
        renderChips(); renderTray(); onChange();
      };
      optWrap.appendChild(b);
    });
  }

  function renderTray() {
    tray.innerHTML = '';
    const total = value.selected.length + value.custom.length;
    tray.classList.toggle('empty', total === 0);
    value.selected.forEach(c => {
      const p = document.createElement('span'); p.className = 'pill';
      p.innerHTML = `${c} <button class="rm" type="button">✕</button>`;
      p.querySelector('.rm').onclick = () => { value.selected = value.selected.filter(x => x !== c); renderChips(); renderTray(); onChange(); };
      tray.appendChild(p);
    });
    value.custom.forEach((c, idx) => {
      const p = document.createElement('span'); p.className = 'pill custom';
      p.innerHTML = `${c} <button class="rm" type="button">✕</button>`;
      p.querySelector('.rm').onclick = () => { value.custom.splice(idx, 1); renderTray(); onChange(); };
      tray.appendChild(p);
    });
    if (flagCheck) {
      const anyFlag = value.custom.some(flagPersonalDisclosure);
      flagBanner.style.display = anyFlag ? 'block' : 'none';
    }
  }

  addBtn.onclick = () => {
    const t = input.value.trim();
    if (!t) return;
    if (single) value.custom = [t]; else value.custom.push(t);
    input.value = '';
    renderTray(); onChange();
  };
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); } });

  renderChips(); renderTray();
  box.appendChild(optWrap); box.appendChild(tray);
  if (flagCheck) box.appendChild(flagBanner);
  box.appendChild(addRow);
  container.appendChild(box);
  return { refresh: () => { renderChips(); renderTray(); } };
}

function ensureField(store, key) {
  if (!store[key]) store[key] = { selected: [], custom: [] };
  return store[key];
}

function fieldFilled(v) { return (v.selected.length + v.custom.length) > 0; }

/* ---------- Render ---------- */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (currentLanternIndex() >= 0) app.appendChild(renderLanternPath());
  const map = {
    apisetup: renderApiSetup,
    intro: renderIntro,
    scenario: renderScenario,
    vreact: renderVReact,
    reflect: renderReflect,
    backcast: renderBackcast,
    fixchoice: renderFixChoice,
    fix: renderFix,
    aireflect: renderAiReflect,
    thanks: renderThanks
  };
  app.appendChild(map[ctl.phase]());
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ---------- API Setup Screen ---------- */
function renderApiSetup() {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="eyebrow">Build Our Future — Setup</div>
    <h1>Connect your Anthropic API key</h1>
    <div class="api-setup">
      <p>This tool uses the <strong>Anthropic API</strong> (claude-sonnet-5) to generate a personalised reflection summary at the end. Your key is stored only in this browser session and never sent anywhere except Anthropic's servers.</p>
      <label class="q" for="apiKeyInput">Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-…" autocomplete="off" value="${getApiKey()}" />
      <p class="api-note">Don't have a key? You can still complete the survey — the AI reflection will be skipped, but all your answers will be saved locally. <a href="https://console.anthropic.com/" target="_blank" rel="noopener" style="color:var(--teal);">Get a key at console.anthropic.com →</a></p>
      <div class="error-msg" id="apiErr"></div>
      <div class="btn-row" style="justify-content:space-between;">
        <button class="ghost" id="skipApiBtn">Skip — continue without AI</button>
        <button class="primary" id="saveApiBtn">Save key &amp; continue →</button>
      </div>
    </div>
  `;
  div.querySelector('#saveApiBtn').onclick = () => {
    const val = div.querySelector('#apiKeyInput').value.trim();
    if (!val.startsWith('sk-ant-') && val !== '') {
      div.querySelector('#apiErr').textContent = 'That doesn\'t look like a valid Anthropic API key (should start with sk-ant-).';
      return;
    }
    if (val) setApiKey(val);
    ctl.phase = 'intro'; render();
  };
  div.querySelector('#skipApiBtn').onclick = () => {
    ctl.phase = 'intro'; render();
  };
  div.querySelector('#apiKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') div.querySelector('#saveApiBtn').click();
  });
  return div;
}

/* ---------- Intro ---------- */
function renderIntro() {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="eyebrow">Build Our Future — a healthcare futures game</div>
    <h1>What could healthcare look like for your community — in 3, 5, and 10 years?</h1>
    <div class="card">
      <p>We're gathering reflections on healthcare access to imagine what better could look like. Instead of a long form, you'll <strong>tap the pieces that fit</strong> and bundle them into your answer — add your own words anytime something's missing.</p>
      <p>You'll react to a short scenario, reflect a little more broadly, then backcast from 3 possible futures. At the end, you can optionally design your own idea for fixing it.</p>
      <p class="muted">No name or address collected — just an anonymous ID: <span class="anon-id">${ctl.builder.record.anonId}</span>. Share general reflections rather than personal medical details. About 8–10 minutes, and it moves quickly.</p>
    </div>
    <div class="btn-row" style="justify-content:flex-end;">
      <button class="ghost" id="changeKeyBtn" style="font-size:12px;">⚙️ Change API key</button>
      <button class="primary" id="startBtn">Let's build it →</button>
    </div>
  `;
  div.querySelector('#startBtn').onclick = () => { ctl.phase = 'scenario'; render(); };
  div.querySelector('#changeKeyBtn').onclick = () => { ctl.phase = 'apisetup'; render(); };
  return div;
}

/* ---------- Scenario ---------- */
function renderScenario() {
  const div = document.createElement('div');
  div.innerHTML = `<h1>Which of these feels most familiar?</h1><div class="card"><div class="scenario-grid" id="grid"></div>
    <div class="btn-row"><button class="ghost" id="backBtn">Back</button><button class="primary" id="nextBtn" disabled>Continue →</button></div></div>`;
  const grid = div.querySelector('#grid'); const nextBtn = div.querySelector('#nextBtn');
  SCENARIOS.forEach(s => {
    const el = document.createElement('div'); el.className = 'scenario-pick' + (ctl.builder.record.scenarioId === s.id ? ' selected' : '');
    el.innerHTML = `<span class="tap-hint">tap to pick</span><span class="vignette-tag">${s.tag}</span><div style="font-style:italic;line-height:1.65;font-size:15px;">${s.text}</div>`;
    el.onclick = () => {
      grid.querySelectorAll('.scenario-pick').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected'); ctl.builder.record.scenarioId = s.id; nextBtn.disabled = false;
    };
    grid.appendChild(el);
  });
  nextBtn.disabled = !ctl.builder.record.scenarioId;
  div.querySelector('#backBtn').onclick = () => { ctl.phase = 'intro'; render(); };
  nextBtn.onclick = () => { ctl.phase = 'vreact'; ctl.vIdx = 0; render(); };
  return div;
}

/* ---------- VReact ---------- */
function renderVReact() {
  const div = document.createElement('div');
  const q = VREACT_QUESTIONS[ctl.vIdx];
  const v = ensureField(ctl.builder.record.vreact, q.key);
  div.innerHTML = `<h1>React to the scenario</h1><div class="card">
      <p class="muted">Question ${ctl.vIdx+1} of ${VREACT_QUESTIONS.length}</p>
      <label class="q">${q.label}</label><span class="q-hint">${q.hint}</span>
      <div id="field"></div>
      <div class="encourage" id="enc"></div>
      <div class="btn-row">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="nextBtn" disabled>${ctl.vIdx===VREACT_QUESTIONS.length-1 ? 'Continue to reflection →' : 'Next →'}</button>
      </div></div>`;
  const nextBtn = div.querySelector('#nextBtn'); const enc = div.querySelector('#enc');
  function refreshBtn() { nextBtn.disabled = !fieldFilled(v); enc.textContent = fieldFilled(v) ? '✨ nice — that\'s taking shape' : ''; }
  mountChipField(div.querySelector('#field'), { chips:q.chips, value:v, flagCheck:true, onChange:refreshBtn });
  refreshBtn();
  div.querySelector('#backBtn').onclick = () => { if (ctl.vIdx>0) { ctl.vIdx--; render(); } else { ctl.phase='scenario'; render(); } };
  nextBtn.onclick = () => {
    if (ctl.vIdx < VREACT_QUESTIONS.length-1) { ctl.vIdx++; render(); }
    else { ctl.phase='reflect'; ctl.rIdx=0; render(); }
  };
  return div;
}

/* ---------- Reflect ---------- */
function renderReflect() {
  const div = document.createElement('div');
  const q = REFLECT_QUESTIONS[ctl.rIdx];
  const v = ensureField(ctl.builder.record.reflect, q.key);
  div.innerHTML = `<h1>A bit more broadly</h1><div class="card">
      <span class="muted">Reflection ${ctl.rIdx+1} of ${REFLECT_QUESTIONS.length}</span>
      <label class="q">${q.label}</label><span class="q-hint">${q.hint}</span>
      <div id="field"></div>
      <div class="encourage" id="enc"></div>
      <div class="btn-row">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="nextBtn" disabled>${ctl.rIdx===REFLECT_QUESTIONS.length-1 ? 'Continue to backcasting →' : 'Next →'}</button>
      </div></div>`;
  const nextBtn = div.querySelector('#nextBtn'); const enc = div.querySelector('#enc');
  function refreshBtn() { nextBtn.disabled = !fieldFilled(v); enc.textContent = fieldFilled(v) ? '🌱 good — your picture is growing' : ''; }
  mountChipField(div.querySelector('#field'), { chips:q.chips, value:v, flagCheck:true, onChange:refreshBtn });
  refreshBtn();
  div.querySelector('#backBtn').onclick = () => { if (ctl.rIdx>0) { ctl.rIdx--; render(); } else { ctl.phase='vreact'; ctl.vIdx=VREACT_QUESTIONS.length-1; render(); } };
  nextBtn.onclick = () => {
    if (ctl.rIdx < REFLECT_QUESTIONS.length-1) { ctl.rIdx++; render(); }
    else { ctl.phase='backcast'; ctl.hIdx=0; render(); }
  };
  return div;
}

/* ---------- Backcast ---------- */
function renderBackcast() {
  const div = document.createElement('div');
  const h = HORIZONS[ctl.hIdx];
  const hb = ctl.builder.record.backcast[h.years] || (ctl.builder.record.backcast[h.years] = {});
  const vVal = ensureField(hb, 'vision'); const sVal = ensureField(hb, 'steps');
  div.innerHTML = `<h1>Backcasting from the future</h1><div class="card">
      <span class="horizon-tag">🔮 ${h.years}-year horizon</span>
      <label class="q">${h.prompt}</label><span class="q-hint">Tap the futures that feel right.</span>
      <div id="fieldV"></div>
      <label class="q" style="margin-top:18px;">${h.stepPrompt}</label><span class="q-hint">What gets us there.</span>
      <div id="fieldS"></div>
      <div class="encourage" id="enc"></div>
      <div class="btn-row">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="nextBtn" disabled>${ctl.hIdx===2 ? 'See what you\'ve built →' : 'Next horizon →'}</button>
      </div></div>`;
  const nextBtn = div.querySelector('#nextBtn'); const enc = div.querySelector('#enc');
  function refreshBtn() {
    nextBtn.disabled = !(fieldFilled(vVal) && fieldFilled(sVal));
    enc.textContent = (fieldFilled(vVal) && fieldFilled(sVal)) ? `🕯️ the ${h.years}-year lantern is lighting up` : '';
  }
  mountChipField(div.querySelector('#fieldV'), { chips:h.visionChips, value:vVal, onChange:refreshBtn });
  mountChipField(div.querySelector('#fieldS'), { chips:h.stepChips, value:sVal, onChange:refreshBtn });
  refreshBtn();
  div.querySelector('#backBtn').onclick = () => { if (ctl.hIdx>0) { ctl.hIdx--; render(); } else { ctl.phase='reflect'; ctl.rIdx=REFLECT_QUESTIONS.length-1; render(); } };
  nextBtn.onclick = () => {
    if (ctl.hIdx < 2) { ctl.hIdx++; render(); } else { ctl.phase='fixchoice'; render(); }
  };
  return div;
}

/* ---------- Fix Choice ---------- */
function renderFixChoice() {
  const div = document.createElement('div');
  div.innerHTML = `<h1>Want to design your own idea?</h1><div class="card">
      <p>Optional bonus round. Sketch out something — an app, a role, a programme, a policy, anything — that could help with situations like the one you reacted to earlier.</p>
      <div class="btn-row">
        <button class="ghost" id="skipBtn">Skip, I'm done</button>
        <button class="primary" id="yesBtn">Yes, let's build it →</button>
      </div></div>`;
  div.querySelector('#skipBtn').onclick = () => { ctl.phase='aireflect'; render(); };
  div.querySelector('#yesBtn').onclick = () => { ctl.phase='fix'; render(); };
  return div;
}

/* ---------- Fix (Design your own) ---------- */
function renderFix() {
  const div = document.createElement('div');
  if (!ctl.builder.record.fix) ctl.builder.record.fix = {
    name:'', form:'', livesWith:'',
    functionChips:{selected:[],custom:[]},
    responsible:{selected:[],custom:[]},
    emotion:{selected:[],custom:[]},
    constraints:{selected:[],custom:[]}
  };
  const fx = ctl.builder.record.fix;

  div.innerHTML = `<h1>Design your fix</h1><div class="card">
      <label class="q" for="fname">What would you call it?</label>
      <input type="text" id="fname" value="${fx.name || ''}" placeholder="Give your idea a name…" style="width:100%;font-family:'Inter',sans-serif;font-size:14.5px;padding:11px 13px;border-radius:8px;border:1px solid var(--line);background:#FCFBF8;margin-bottom:16px;" />
      <label class="q">What is it?</label><span class="q-hint">Pick one.</span>
      <div id="formGrid" class="icon-grid"></div>
      <label class="q">Where does it live?</label><span class="q-hint">Pick one.</span>
      <div id="livesGrid" class="icon-grid"></div>
      <label class="q">What does it actually do?</label><span class="q-hint">Stack its powers.</span>
      <div id="fnField"></div>
      <label class="q">Who's responsible for making it happen?</label>
      <div id="respField"></div>
      <label class="q">How should it make someone feel?</label>
      <div id="emoField"></div>
      <label class="q">What should it never do?</label>
      <div id="conField"></div>
      <div class="postcard" id="preview" style="display:none;"></div>
      <div class="btn-row">
        <button class="ghost" id="backBtn">Back</button>
        <button class="primary" id="submitBtn" disabled>Submit my idea →</button>
      </div></div>`;

  const fname = div.querySelector('#fname');
  const submitBtn = div.querySelector('#submitBtn');
  const preview = div.querySelector('#preview');

  function iconGrid(container, options, currentKey) {
    container.innerHTML = '';
    options.forEach(o => {
      const t = document.createElement('div');
      t.className = 'icon-tile' + (fx[currentKey] === o ? ' selected' : '');
      const parts = o.split(' ');
      const em = parts[0];
      const label = parts.slice(1).join(' ');
      t.innerHTML = `<span class="em">${em}</span>${label}`;
      t.onclick = () => { fx[currentKey] = o; iconGrid(container, options, currentKey); check(); };
      container.appendChild(t);
    });
  }

  iconGrid(div.querySelector('#formGrid'), FIX_FORM_OPTIONS, 'form');
  iconGrid(div.querySelector('#livesGrid'), FIX_LIVES_OPTIONS, 'livesWith');
  mountChipField(div.querySelector('#fnField'), { chips:FIX_FUNCTION_CHIPS, value:fx.functionChips, onChange:check });
  mountChipField(div.querySelector('#respField'), { chips:FIX_RESPONSIBLE_CHIPS, value:fx.responsible, onChange:check });
  mountChipField(div.querySelector('#emoField'), { chips:FIX_EMOTION_CHIPS, value:fx.emotion, onChange:check });
  mountChipField(div.querySelector('#conField'), { chips:FIX_CONSTRAINT_CHIPS, value:fx.constraints, onChange:check, flagCheck:true });

  fname.addEventListener('input', () => { fx.name = fname.value; check(); });

  function check() {
    const filled = fx.name.trim() && fx.form && fx.livesWith &&
      fieldFilled(fx.functionChips) && fieldFilled(fx.responsible) &&
      fieldFilled(fx.emotion) && fieldFilled(fx.constraints);
    submitBtn.disabled = !filled;
    if (fx.name.trim()) {
      preview.style.display = 'block';
      const fnTags = [...fx.functionChips.selected, ...fx.functionChips.custom].map(c=>`<span class="tag">${c}</span>`).join('') || '—';
      preview.innerHTML = `<div class="postcard-title">🎁 ${fx.name.trim()}</div>
        <div class="muted" style="margin-bottom:8px;">${fx.form || '…'} · lives with ${fx.livesWith || '…'}</div>
        <div class="postcard-label">does</div><div class="postcard-row">${fnTags}</div>`;
    } else {
      preview.style.display = 'none';
    }
  }
  check();

  div.querySelector('#backBtn').onclick = () => { ctl.phase='fixchoice'; render(); };
  submitBtn.onclick = () => { ctl.phase='aireflect'; render(); };
  return div;
}

/* ---------- AI Reflect ---------- */
function renderAiReflect() {
  const div = document.createElement('div');
  div.innerHTML = `<h1>What you've built</h1><div class="card">
      <p class="loading" id="loadingMsg">Weaving your reflections together <span class="dotpulse"><span></span><span></span><span></span></span></p>
      <div class="reflection-box" id="box" style="display:none;"></div>
      <div class="postcard" id="postcard" style="display:none;"></div>
      <div class="btn-row"><span></span><button class="primary" id="doneBtn" style="display:none;">Submit &amp; finish →</button></div>
    </div>`;

  const box = div.querySelector('#box');
  const loadingMsg = div.querySelector('#loadingMsg');
  const doneBtn = div.querySelector('#doneBtn');
  const postcard = div.querySelector('#postcard');

  const scen = SCENARIOS.find(s => s.id === ctl.builder.record.scenarioId);
  postcard.style.display = 'block';
  const v10 = ctl.builder.record.backcast[10] && ctl.builder.record.backcast[10].vision;
  const v10Tags = v10 ? [...v10.selected, ...v10.custom].map(c=>`<span class="tag">${c}</span>`).join('') : '—';
  postcard.innerHTML = `<div class="postcard-title">🗺️ Your future, at a glance</div>
    <div class="postcard-label">Starting point</div><div class="postcard-row"><span class="tag">${scen ? scen.tag : ''}</span></div>
    <div class="postcard-label">10-year vision</div><div class="postcard-row">${v10Tags}</div>
    ${ctl.builder.record.fix && ctl.builder.record.fix.name ? `<div class="postcard-label">Your idea</div><div class="postcard-row"><span class="tag">${ctl.builder.record.fix.name}</span></div>` : ''}`;

  ReflectionService.paraphrase(ctl.builder).then(text => {
    ctl.builder.record.aiReflection = text;
    loadingMsg.style.display = 'none';
    box.style.display = 'block';
    box.textContent = text;
    doneBtn.style.display = 'inline-block';
  });

  doneBtn.onclick = async () => {
    doneBtn.disabled = true;
    doneBtn.textContent = 'Saving…';
    const record = ctl.builder.build();
    await saveRecord(record);
    ctl.phase = 'thanks'; render();
  };
  return div;
}

/* ---------- Thanks ---------- */
function renderThanks() {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="thanks-icon">🙏</div>
      <h1>Thank you for building this with us</h1>
      <p>Your reflections have been saved anonymously (ID: <span class="anon-id">${ctl.builder.record.anonId}</span>) and will be grouped with others' to find shared themes across 3, 5, and 10-year horizons.</p>
      <p class="muted">You can close this window. Nothing else is needed.</p>
    </div>
    <div class="card" style="margin-top:0;">
      <h2>Your AI reflection summary</h2>
      <div class="reflection-box">${ctl.builder.record.aiReflection || '(No AI summary generated)'}</div>
    </div>
    <p class="footer-note">If anything raised concerns for you, please reach out to your GP or a local community health service.</p>
  `;
  return div;
}

/* ---------- Boot ---------- */
render();
</script>
</body>
</html>
